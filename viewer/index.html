<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Bellwether" />
<meta name="theme-color" content="#0b0e14" />
<title>Bellwether Monitor</title>
<style>
  :root {
    --bg: #0b0e14; --card: #131722; --raised: #1a2030; --border: #232a3a;
    --text: #e6e9ef; --muted: #8a93a6; --accent: #5b8cff; --accent2: #7aa2ff;
    --green: #4ade80; --red: #f87171; --yellow: #facc15;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; background: var(--bg); color: var(--text); font-variant-numeric: tabular-nums;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 24px);
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 14px; }
  header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  header .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
  header h1 { font-size: 17px; font-weight: 700; margin: 0; flex: 1; }
  .gear { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 6px 10px; font-size: 15px; cursor: pointer; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 13px 14px; margin-bottom: 12px; }
  .card h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin: 0 0 9px; font-weight: 600; }
  .pill { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; border-radius: 999px; padding: 4px 11px; border: 1px solid var(--border); }
  .pill::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .bull { color: var(--green); background: rgba(74,222,128,.1); border-color: rgba(74,222,128,.4); }
  .chop { color: var(--yellow); background: rgba(250,204,21,.1); border-color: rgba(250,204,21,.4); }
  .bear { color: var(--red); background: rgba(248,113,113,.1); border-color: rgba(248,113,113,.4); }
  .unknown { color: var(--muted); }
  .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .spread { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .muted { color: var(--muted); } .small { font-size: 12px; } .big { font-size: 19px; font-weight: 700; }
  .pos { color: var(--green); } .neg { color: var(--red); }
  .acct { display: flex; gap: 16px; flex-wrap: wrap; align-items: baseline; }
  .acct .lab { color: var(--muted); font-size: 12px; margin-right: 4px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-weight: 500; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .04em; padding: 4px 6px; border-bottom: 1px solid var(--border); }
  td { padding: 7px 6px; border-bottom: 1px solid var(--border); }
  td.t { font-weight: 700; }
  tr:last-child td { border-bottom: none; }
  .act { background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 3px 11px; font-size: 12px; cursor: pointer; }
  .act:hover { border-color: var(--red); color: var(--red); }
  .strat { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 999px; white-space: nowrap; }
  .leader { color: var(--accent2); background: rgba(91,140,255,.12); }
  .meanrev { color: var(--yellow); background: rgba(250,204,21,.12); }
  .empty { color: var(--muted); font-size: 13px; padding: 4px 2px; }
  .er { color: var(--yellow); font-size: 11px; font-weight: 600; }
  .feed span { font-size: 12px; }
  /* nightly review proposals */
  .prop { border: 1px solid var(--border); border-radius: 10px; padding: 10px 11px; margin-bottom: 9px; background: var(--raised); }
  .prop .hd { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-bottom: 6px; }
  .prop .tk { font-weight: 700; font-size: 15px; }
  .call { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 999px; }
  .call.Take { color: var(--green); background: rgba(74,222,128,.12); }
  .call.Watch { color: var(--yellow); background: rgba(250,204,21,.12); }
  .ladder { font-size: 12px; margin-bottom: 5px; }
  .case { font-size: 12px; line-height: 1.45; margin: 3px 0; }
  .case .lbl { font-weight: 700; }
  .case.bull .lbl { color: var(--green); } .case.bear .lbl { color: var(--red); }
  .btns { display: flex; gap: 8px; margin-top: 9px; }
  .btns button { flex: 1; border-radius: 8px; padding: 9px; font-size: 13px; font-weight: 700; cursor: pointer; border: 1px solid; }
  .approve { background: rgba(74,222,128,.12); border-color: var(--green); color: var(--green); }
  .skip { background: rgba(248,113,113,.1); border-color: var(--red); color: var(--red); }
  .evt { display: flex; gap: 8px; font-size: 11.5px; padding: 4px 0; border-bottom: 1px solid var(--border); }
  .evt:last-child { border-bottom: none; }
  .evt .tm { color: var(--muted); white-space: nowrap; }
  .evt .cat { color: var(--accent2); font-weight: 700; text-transform: uppercase; font-size: 9.5px; min-width: 52px; }
  .note-body { font-size: 13.5px; line-height: 1.55; color: var(--text); }
  .note-body strong { color: var(--text); }
  .updated { text-align: center; color: var(--muted); font-size: 11px; margin-top: 4px; }
  .offline { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.4); color: var(--red); border-radius: 10px; padding: 10px 12px; margin-bottom: 12px; font-size: 13px; }
  /* settings drawer */
  .drawer-bg { position: fixed; inset: 0; background: rgba(4,6,10,.6); display: none; z-index: 40; }
  .drawer-bg.open { display: block; }
  .drawer { position: fixed; left: 0; right: 0; bottom: 0; background: var(--card); border-top: 1px solid var(--border); border-radius: 16px 16px 0 0; padding: 16px 16px calc(env(safe-area-inset-bottom) + 20px); z-index: 41; transform: translateY(100%); transition: transform .2s; max-width: 720px; margin: 0 auto; }
  .drawer.open { transform: translateY(0); }
  .drawer h2 { margin: 0 0 12px; font-size: 14px; }
  .danger { width: 100%; border-radius: 10px; padding: 13px; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 10px; border: 1px solid; }
  .danger.stop { background: rgba(250,204,21,.1); border-color: var(--yellow); color: var(--yellow); }
  .danger.kill { background: rgba(248,113,113,.12); border-color: var(--red); color: var(--red); }
  .drawer .note { color: var(--muted); font-size: 12px; line-height: 1.5; }
  .drawer .close-x { float: right; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="dot"></span>
    <h1>Bellwether Monitor</h1>
    <span id="regime"></span>
    <button class="gear" onclick="openDrawer()">⚙</button>
  </header>
  <div id="offline" class="offline" style="display:none">Can't reach the backend — retrying…</div>
  <div id="content"></div>
  <div class="updated" id="updated"></div>
</div>

<div class="drawer-bg" id="drawerBg" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <button class="close-x" onclick="closeDrawer()">✕</button>
  <h2>Emergency controls</h2>
  <button class="danger stop" id="killBtn" onclick="killEngine()">⏸ Stop auto-scan / auto-trade</button>
  <button class="danger kill" onclick="closeAll()">⨯ Close ALL open positions</button>
  <p class="note">Read-only monitor. These are your brakes: stopping the engine halts new alerts/auto-trades (open positions keep their stop/target). "Close all" exits every open paper position now, at the live price. Paper only.</p>
</div>

<script>
const fmt = (n, d=2) => (typeof n === "number" ? n.toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d}) : "—");
const signed = (n) => (n>=0?"+":"−") + "$" + fmt(Math.abs(n));
async function api(path, opts) { const r = await fetch(path, opts ? {headers:{"Content-Type":"application/json"},...opts} : undefined); if(!r.ok) throw new Error(r.status); return r.json(); }

let engineState = null;

async function load() {
  try {
    const [regime, engine, acct, journal, queue, notes, events] = await Promise.all([
      api("/api/regime").catch(()=>({available:false})),
      api("/api/alerts/engine").catch(()=>null),
      api("/api/paper/account").catch(()=>null),
      api("/api/journal").catch(()=>({trades:[],summary:{}})),
      api("/api/queue").catch(()=>({pending:[],decided:[]})),
      api("/api/daily-notes").catch(()=>({notes:[]})),
      api("/api/events?n=16").catch(()=>({events:[]})),
    ]);
    engineState = engine;
    document.getElementById("offline").style.display = "none";
    render(regime, engine, acct, journal, queue, notes, events);
    document.getElementById("updated").textContent = "updated " + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById("offline").style.display = "block";
  }
}

function render(regime, engine, acct, journal, queue, notes, events) {
  // regime pill
  const rg = document.getElementById("regime");
  if (regime && regime.available) rg.innerHTML = `<span class="pill ${regime.regime}">${regime.label} → ${regime.strategy}</span>`;
  else rg.innerHTML = `<span class="pill unknown">regime —</span>`;

  let html = "";

  // engine status
  if (engine) {
    const on = engine.enabled;
    const mode = { auto:"Auto-trade (paper)", review:"Review", nightly:"Nightly" }[engine.mode] || engine.mode;
    const statusMap = { watching:"Watching", "auto-traded":"Auto-trading", built:"Setups proposed", executed:"Morning done", "warming-up":"Open settling", "market-closed":"Market closed", "bear-cash":"Bear — holding cash", error:"Reconnecting", idle:"Idle" };
    const status = on ? (statusMap[engine.last_status] || "On") : "Off";
    const last = engine.last_run ? new Date(engine.last_run).toLocaleTimeString() : "—";
    html += `<div class="card"><div class="spread"><h2 style="margin:0">Alert engine</h2>
      <span class="pill ${on?'bull':'unknown'}" style="font-size:11px">${on ? "ON" : "OFF"}</span></div>
      <div class="row small" style="margin-top:8px">
        <span class="muted">${status}</span><span class="muted">·</span>
        <span>${mode}</span><span class="muted">·</span>
        <span class="muted">last ${last}</span>
        ${engine.last_status==="auto-traded"?`<span class="muted">·</span><span>opened ${engine.last_new_count}</span>`:""}
      </div></div>`;
  }

  // account + positions
  if (acct) {
    const tot = acct.total_pnl||0;
    html += `<div class="card"><h2>Paper account</h2>
      <div class="acct"><span class="big">$${fmt(acct.equity)}</span>
        <span><span class="lab">Cash</span>$${fmt(acct.cash)}</span>
        <span class="${acct.open_pnl>=0?'pos':'neg'}"><span class="lab">Open</span>${signed(acct.open_pnl)}</span>
        <span class="${acct.realized_pnl>=0?'pos':'neg'}"><span class="lab">Realized</span>${signed(acct.realized_pnl)}</span>
      </div>`;
    if (acct.positions && acct.positions.length) {
      html += `<table style="margin-top:10px"><thead><tr><th>Ticker</th><th>Now</th><th>P&L</th><th>R</th><th></th></tr></thead><tbody>`;
      for (const p of acct.positions) {
        html += `<tr><td class="t">${p.ticker}<div class="muted small">${p.shares} @ $${fmt(p.entry)}${p.trail_stop?` · trail $${fmt(p.trail_stop)}`:""}</div></td>
          <td>$${fmt(p.current)}</td>
          <td class="${p.unrealized>=0?'pos':'neg'}">${signed(p.unrealized)}<div class="small ${p.unrealized>=0?'pos':'neg'}">${p.unrealized_pct>=0?'+':''}${p.unrealized_pct}%</div></td>
          <td class="${(p.r??0)>=0?'pos':'neg'}">${p.r==null?'—':(p.r>=0?'+':'')+p.r+'R'}</td>
          <td><button class="act" onclick="closePos('${p.id}','${p.ticker}')">Close</button></td></tr>`;
      }
      html += `</tbody></table>`;
    } else {
      html += `<div class="empty" style="margin-top:8px">No open positions.</div>`;
    }
    // resting orders
    if (acct.orders && acct.orders.length) {
      html += `<h2 style="margin-top:14px">Resting orders</h2><table><thead><tr><th>Ticker</th><th>Type</th><th>Fill</th><th></th></tr></thead><tbody>`;
      for (const o of acct.orders) {
        html += `<tr><td class="t">${o.ticker}</td><td class="small">${o.type==='moo'?'At open':'Limit'}</td>
          <td class="small">${o.type==='limit'?'$'+fmt(o.limit_price):'next open'}</td>
          <td><button class="act" onclick="cancelOrder('${o.id}','${o.ticker}')">Cancel</button></td></tr>`;
      }
      html += `</tbody></table>`;
    }
    html += `</div>`;
  }

  // nightly review queue — the human approves/skips tomorrow's proposed tickets
  if (queue) {
    const pend = queue.pending || [];
    const isNightly = engine && engine.mode === "nightly";
    html += `<div class="card"><h2>${isNightly?"Tonight’s review":"Alerts"}${pend.length?` · ${pend.length}`:""}</h2>`;
    if (pend.length) {
      for (const p of pend) {
        const pl = p.plan||{};
        html += `<div class="prop">
          <div class="hd"><span class="tk">${p.ticker}</span>
            <span class="strat ${p.strategy==='mean_reversion'?'meanrev':'leader'}">${p.strategy==='mean_reversion'?'Mean-rev':'Leader'}</span>
            ${p.call?`<span class="call ${p.call}">${p.call}${p.conviction?' · '+p.conviction:''}</span>`:""}
            ${p.earnings_soon?`<span class="er">⚠${p.days_to_earnings}d</span>`:""}
            ${p.trading_day?`<span class="muted small" style="margin-left:auto">for ${p.trading_day}</span>`:""}
          </div>
          <div class="ladder">$${fmt(pl.entry)} → <span class="neg">$${fmt(pl.stop)}</span> → <span class="pos">$${fmt(pl.target)}</span>
            ${pl.shares?`<span class="muted">· ${pl.shares} sh${pl.reward_risk?` · ${pl.reward_risk}:1`:""}</span>`:""}</div>
          ${p.bull?`<div class="case bull"><span class="lbl">Bull:</span> ${p.bull}</div>`:""}
          ${p.bear?`<div class="case bear"><span class="lbl">Bear:</span> ${p.bear}</div>`:""}
          ${p.reason?`<div class="case muted"><span class="lbl">Verdict:</span> ${p.reason}</div>`:""}
          <div class="btns">
            <button class="approve" onclick="decide('${p.id}','approve','${p.ticker}')">✓ Approve</button>
            <button class="skip" onclick="decide('${p.id}','deny','${p.ticker}')">✕ Skip</button>
          </div></div>`;
      }
    } else {
      html += `<div class="empty">${isNightly?"Nothing to review — the engine proposes after the close.":"No pending alerts."}</div>`;
    }
    if (queue.decided && queue.decided.length) {
      const mk = { executed:["✓ bought","pos"], approved:["✓ approved","pos"], skipped:["skipped","muted"], denied:["✕ skipped","neg"], expired:["expired","muted"] };
      html += `<div class="feed small" style="margin-top:6px"><span class="muted">Recent: </span>` +
        queue.decided.slice(0,10).map(d=>{const m=mk[d.status]||[d.status,"muted"]; return `<span class="${m[1]}">${d.ticker} ${m[0]}</span>`;}).join(" · ") + `</div>`;
    }
    html += `</div>`;
  }

  // journal scoreboard + recent closed
  if (journal) {
    const sum = journal.summary || {};
    html += `<div class="card"><h2>Journal</h2>`;
    const vids = Object.keys(sum);
    if (vids.length) {
      html += `<table><thead><tr><th>Variation</th><th>Trades</th><th>Win%</th><th>Expectancy</th></tr></thead><tbody>`;
      for (const v of vids) { const s = sum[v];
        html += `<tr><td class="t">${v}${s.low_sample?' ⚠':''}</td><td>${s.trades}</td><td>${s.winrate}%</td>
          <td class="${s.expectancy_r>=0?'pos':'neg'}">${s.expectancy_r>=0?'+':''}${s.expectancy_r}R</td></tr>`;
      }
      html += `</tbody></table>`;
    }
    const closed = (journal.trades||[]).filter(t=>t.status==='closed').slice(-6).reverse();
    if (closed.length) {
      html += `<table style="margin-top:10px"><thead><tr><th>Ticker</th><th>R</th><th>Outcome</th><th>Why</th></tr></thead><tbody>`;
      for (const t of closed) {
        html += `<tr><td class="t">${t.ticker}</td><td class="${(t.r_multiple??0)>=0?'pos':'neg'}">${t.r_multiple==null?'—':(t.r_multiple>=0?'+':'')+t.r_multiple+'R'}</td>
          <td class="${t.outcome==='win'?'pos':t.outcome==='loss'?'neg':'muted'}">${t.outcome||'—'}</td><td class="small muted">${t.exit_reason||''}</td></tr>`;
      }
      html += `</tbody></table>`;
    } else if (!vids.length) {
      html += `<div class="empty">No trades logged yet.</div>`;
    }
    html += `</div>`;
  }

  // daily note (the AI's observational read of the latest trading day)
  const latest = notes && notes.notes && notes.notes[0];
  if (latest) {
    const md = latest.content
      .replace(/^# .*$/m, "").replace(/^---+$/gm, "")
      .replace(/^#{1,6}\s*(.*)$/gm, "<strong>$1</strong>")
      .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
      .replace(/_([^_]+)_/g, "<span class='muted'>$1</span>")
      .replace(/^[-*]\s+/gm, "• ").trim().replace(/\n/g, "<br>");
    html += `<div class="card"><h2>Daily note · ${latest.date}</h2><div class="note-body">${md}</div></div>`;
  }

  // engine activity — the audit trail of every move (regime, scan, propose, review, execute, skip)
  if (events && events.events && events.events.length) {
    html += `<div class="card"><h2>Engine activity</h2>`;
    for (const e of events.events.slice(0,16)) {
      const tm = (e.et||"").slice(11,16);
      html += `<div class="evt"><span class="tm">${tm}</span><span class="cat">${e.category}</span><span>${e.message}</span></div>`;
    }
    html += `</div>`;
  }

  document.getElementById("content").innerHTML = html;
}

// ---- nightly review: the human's load-bearing Approve/Skip (marks intent; the morning re-check executes) ----
async function decide(id, decision, ticker) {
  const verb = decision === "approve" ? "Approve" : "Skip";
  if (!confirm(`${verb} ${ticker} for the next open?`)) return;
  try { await api("/api/queue/decide", {method:"POST", body: JSON.stringify({id, decision})}); load(); }
  catch(e){ alert("Failed: " + e.message); }
}

// ---- the defensive actions ----
async function closePos(id, ticker) {
  if (!confirm(`Close ${ticker} now at the live price?`)) return;
  try { await api("/api/paper/close", {method:"POST", body: JSON.stringify({trade_id:id})}); load(); }
  catch(e){ alert("Close failed: " + e.message); }
}
async function cancelOrder(id, ticker) {
  if (!confirm(`Cancel the resting ${ticker} order?`)) return;
  try { await api("/api/paper/cancel", {method:"POST", body: JSON.stringify({order_id:id})}); load(); }
  catch(e){ alert("Cancel failed: " + e.message); }
}
async function killEngine() {
  try { await api("/api/alerts/engine", {method:"POST", body: JSON.stringify({enabled:false})}); closeDrawer(); load(); }
  catch(e){ alert("Failed: " + e.message); }
}
async function closeAll() {
  const acct = await api("/api/paper/account").catch(()=>null);
  const n = acct?.positions?.length || 0;
  if (!n) { alert("No open positions to close."); return; }
  if (!confirm(`Close ALL ${n} open positions now at the live price? This can't be undone.`)) return;
  for (const p of acct.positions) { try { await api("/api/paper/close",{method:"POST",body:JSON.stringify({trade_id:p.id})}); } catch(e){} }
  closeDrawer(); load();
}
function openDrawer(){ const k=document.getElementById("killBtn"); if(engineState) k.textContent = engineState.enabled ? "⏸ Stop auto-scan / auto-trade" : "Auto-scan is already OFF"; document.getElementById("drawerBg").classList.add("open"); document.getElementById("drawer").classList.add("open"); }
function closeDrawer(){ document.getElementById("drawerBg").classList.remove("open"); document.getElementById("drawer").classList.remove("open"); }

load();
setInterval(load, 5000);
</script>
</body>
</html>
